<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <!-- Zoom stays enabled (WCAG 1.4.4 — installed PWAs enforce a zoom lock
         hard). Accidental double-tap zoom while scoring is prevented by
         touch-action: manipulation on the interactive controls instead. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#F6EFDC" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Tally" />
    <!-- Numbers all over this app are innings/scores, not phone numbers —
         stop Safari from auto-linking number-looking text (e.g. "3-2") into
         tappable tel: links. -->
    <meta name="format-detection" content="telephone=no" />
    <!-- OG:BEGIN — link-preview tags (description + Open Graph + Twitter +
         title). For a shared DEEP LINK (a player, a matchup, a team, …), the
         /api/preview edge function replaces this WHOLE block at request time
         with that route's dynamic card + image (see api/preview.js,
         api/og.js, docs/adr/0012-dynamic-link-previews.md). The defaults below
         are the home-page card AND the fallback whenever a route can't be
         resolved — so they must stay valid on their own. og:image here is
         public/og-image.png, generated from scripts/og-image.html. URLs must be
         ABSOLUTE for scrapers.
         Keep the OG:BEGIN/OG:END markers intact — the injector keys on them. -->
    <meta
      name="description"
      content="Tally Baseball supports hand scoring, delayed game watching, and baseball research with live context and sealed game results."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Tally Baseball" />
    <meta
      property="og:title"
      content="Tally Baseball"
    />
    <meta
      property="og:description"
      content="Hand scoring, delayed game watching, and baseball research with live context and sealed game results."
    />
    <meta property="og:url" content="https://bbsbh.vercel.app/" />
    <meta property="og:image" content="https://bbsbh.vercel.app/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Tally Baseball companion for scorekeeping, delayed watching, and research."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Tally Baseball"
    />
    <meta
      name="twitter:description"
      content="Hand scoring, delayed game watching, and baseball research with live context and sealed game results."
    />
    <meta name="twitter:image" content="https://bbsbh.vercel.app/og-image.png" />
    <title>Tally Baseball</title>
    <!-- OG:END -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
