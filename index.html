<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <!-- Zoom stays enabled (WCAG 1.4.4 — installed PWAs enforce a zoom lock
         hard). Accidental double-tap zoom while scoring is prevented by
         touch-action: manipulation on the interactive controls instead. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#F6EFDC" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Scorebook" />
    <!-- Numbers all over this app are innings/scores, not phone numbers —
         stop Safari from auto-linking number-looking text (e.g. "3-2") into
         tappable tel: links. -->
    <meta name="format-detection" content="telephone=no" />
    <meta
      name="description"
      content="Spoiler-safe second-screen companion for scoring baseball by hand."
    />
    <!-- Open Graph / Twitter — the rich link preview when the app is shared
         (iMessage, Slack, Discord, …). og:image is public/og-image.png,
         regenerated by scripts/gen-og-image.mjs from scripts/og-image.html.
         URLs must be ABSOLUTE for scrapers to fetch them. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Scorebook Helper" />
    <meta
      property="og:title"
      content="Scorebook Helper — score by hand, spoiler-free"
    />
    <meta
      property="og:description"
      content="Lineups, umpires, and rosters pulled live from the MLB — with every run, hit, and error taped over until you're ready to look. Keep scoring on paper; this is your second screen."
    />
    <meta property="og:url" content="https://bbsbh.vercel.app/" />
    <meta property="og:image" content="https://bbsbh.vercel.app/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Scorebook — a spoiler-safe companion for scoring baseball by hand"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Scorebook Helper — score by hand, spoiler-free"
    />
    <meta
      name="twitter:description"
      content="Lineups, umpires, and rosters pulled live from the MLB — every score sealed until you tap. Keep scoring on paper; this is your second screen."
    />
    <meta name="twitter:image" content="https://bbsbh.vercel.app/og-image.png" />
    <title>Scorebook Helper</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
