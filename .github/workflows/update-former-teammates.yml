name: Update former teammates

# Daily refresh of public/data/former-teammates.json from the MLB Stats API (see
# scripts/gen-former-teammates.mjs). Pushing to main triggers Vercel's normal
# auto-deploy, so the lineup page's FORMER TEAMMATES card picks up the fresh ties
# for the next few days' matchups each morning with no runtime dependency on the
# hundreds of per-player career-history calls the script runs. Offset from the
# other nightly jobs (war 09:00, rehab 09:30, minors-leaders 10:00) so the
# commits don't race to push.
on:
  schedule:
    - cron: '30 10 * * *' # ~6:30am US Eastern, after overnight roster moves settle
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-former-teammates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/gen-former-teammates.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/former-teammates.json
          git diff --cached --quiet || git commit -m "Update former teammates"
          git push
