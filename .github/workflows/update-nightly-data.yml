name: Update nightly data

# Nightly precompute batch: game notes, WAR, rehab assignments, umpires,
# umpire plate accuracy, minor-league leaders, game call-outs, former
# teammates, career matchups, vs-team splits, milestone watch, team
# transactions, the Fever Baseball radar snapshot (each documented at the top
# of its own scripts/gen-*.mjs) in ONE workflow with a SINGLE commit+push,
# instead of separate crons each triggering its own Vercel deployment.
# Consolidated 2026-07-11 after two of the eight (update-callouts and
# update-former-teammates, both previously at 10:30 UTC) collided on the
# push — a non-fast-forward rejection that silently dropped that night's
# call-outs. README regen was folded in on 2026-07-17 for the same reason,
# then ripped back out on 2026-07-21: its Claude Code Action step has no
# working ANTHROPIC_API_KEY/CLAUDE_CODE_OAUTH_TOKEN secret, and on failure it
# left the git remote's push auth pointed at its own (invalid) OIDC token
# instead of the checkout's GH_BOT_TOKEN — silently discarding every
# generator's output at the final push for every run from 2026-07-18 to
# 2026-07-21. README regen is regenerate-readme.yml now, workflow_dispatch-only.
# gen-comeback-wins.mjs was added to the batch without joining the commit
# step's `git add` list or the fail-check below — harmless on a clean
# fast-forward push, but its always-unstaged output broke the push-race
# rebase retry the first time two nightly runs collided (2026-07-21).
# scripts/warm-previews.mjs (added 2026-07-22) is the one step here that
# ISN'T a gen-*.mjs data generator — it writes no public/data/* file, so it
# deliberately has no entry in the commit step's `git add` list, only in the
# fail-check below. It proactively warms api/preview.js + api/og.js's edge
# cache for today's MLB slate against bbsbh.vercel.app itself.
# The generators here are otherwise unchanged and fully independent (each
# writes its own public/data/* file with no read dependency on another's
# output — gen-callouts.mjs reads vs-team-splits.json only at app runtime,
# never at generation time), so continue-on-error lets one script's failure
# fall through to the rest instead of blocking the batch; the job still
# fails at the end (for cron-failure visibility in the Actions tab) if
# anything errored, but whatever succeeded is already committed by then.
on:
  schedule:
    - cron: '0 7 * * *' # ~3am US Eastern (2-3am during EST) — moved earlier 2026-07-22; the "Wait for yesterday's slate" step below backs off hourly if a late West Coast game is still in progress, up to the old ~7am ET ceiling, instead of always waiting that long
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-nightly-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # main requires the lint-and-build status check, which the default
          # GITHUB_TOKEN can never satisfy on a bare push (no PR = no check
          # run for that commit) — every run since 2026-07-13 had its commit
          # silently rejected at the final push, discarding that night's
          # generator output. GH_BOT_TOKEN is the same fine-grained PAT
          # update-game-score.yml already uses to bypass this.
          token: ${{ secrets.GH_BOT_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 26 # node:sqlite ships stable here (docs/adr/0021) — gen-team-score.mjs/gen-season-score.mjs need it

      - name: Wait for yesterday's slate to go Final
        run: |
          for i in 1 2 3 4; do
            node scripts/check-slate-final.mjs && exit 0
            echo "attempt $i/4: not all games settled yet — waiting 1 hour"
            sleep 3600
          done
          echo "still not all settled after 4 hours — proceeding anyway (matches the old fixed ~7am ET run time)"

      - name: Game notes
        id: game-notes
        continue-on-error: true
        run: node scripts/gen-game-notes.mjs
      - name: WAR
        id: war
        continue-on-error: true
        run: node scripts/gen-war.mjs
      - name: Rehab assignments
        id: rehab
        continue-on-error: true
        run: node scripts/gen-rehab.mjs
      - name: Umpires
        id: umpires
        continue-on-error: true
        run: node scripts/gen-umpires.mjs
      - name: Umpire accuracy
        id: umpire-accuracy
        continue-on-error: true
        run: node scripts/gen-umpire-accuracy.mjs
      - name: Minor-league leaders
        id: minors-leaders
        continue-on-error: true
        run: node scripts/gen-minors-leaders.mjs
      - name: Game call-outs
        id: callouts
        continue-on-error: true
        run: node scripts/gen-callouts.mjs
      - name: Former teammates
        id: former-teammates
        continue-on-error: true
        run: node scripts/gen-former-teammates.mjs
      - name: Career matchups
        id: career-matchups
        continue-on-error: true
        run: node scripts/gen-career-matchups.mjs
      - name: Foul tracker
        id: fouls
        continue-on-error: true
        run: node scripts/gen-fouls.mjs
      - name: Pitcher workload
        id: workload
        continue-on-error: true
        run: node scripts/gen-workload.mjs
      - name: Lineup values
        id: lineup-values
        continue-on-error: true
        run: node scripts/gen-lineup-values.mjs
      - name: Vs-team splits
        id: vs-team-splits
        continue-on-error: true
        run: node scripts/gen-vs-team-splits.mjs
      - name: Savant percentiles
        id: savant-percentiles
        continue-on-error: true
        run: node scripts/gen-savant-percentiles.mjs
      - name: Milestone watch
        id: milestones
        continue-on-error: true
        run: node scripts/gen-milestones.mjs
      - name: Rookie status
        id: rookies
        continue-on-error: true
        run: node scripts/gen-rookies.mjs
      - name: Season Surprise Score
        id: season-score
        continue-on-error: true
        run: node scripts/gen-season-score.mjs
      - name: Team Scores
        id: team-score
        continue-on-error: true
        run: node scripts/gen-team-score.mjs
      - name: Team transactions
        id: team-transactions
        continue-on-error: true
        run: node scripts/gen-team-transactions.mjs
      - name: Fever Baseball radar
        id: fever-radar
        continue-on-error: true
        run: node scripts/gen-fever-radar.mjs
      - name: Comeback wins
        id: comeback-wins
        continue-on-error: true
        run: node scripts/gen-comeback-wins.mjs
      - name: Warm preview cache
        id: warm-previews
        continue-on-error: true
        run: node scripts/warm-previews.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/game-notes.json public/data/war.json public/data/rehab.json public/data/umpires.json public/data/umpire-accuracy.json public/data/minors-leaders.json public/data/callouts public/data/former-teammates.json public/data/career-matchups.json public/data/fouls.json public/data/workload.json public/data/lineup-values.json scripts/data/fouls.sql public/data/vs-team-splits.json public/data/savant-percentiles.json public/data/milestones.json public/data/rookies.json public/data/season-score.json public/data/team-score.json public/data/team-transactions public/data/fever-radar.json scripts/data/team-snapshots.sql scripts/data/player-snapshots.sql public/data/comeback-wins.json scripts/data/comeback-wins.sql 2>/dev/null || true
          git diff --cached --quiet && exit 0
          git commit -m "Update nightly data"
          # Retry with a rebase on a push race, same shape as
          # update-game-score.yml — this workflow's push (now anywhere from
          # ~7:00 to ~11:00 UTC depending on the wait-for-Final backoff above)
          # can collide with that one's every-10-minutes cron.
          for i in 1 2 3 4 5; do
            git push && exit 0
            git fetch origin "$(git rev-parse --abbrev-ref HEAD)"
            git rebase "origin/$(git rev-parse --abbrev-ref HEAD)"
            sleep $((RANDOM % 10 + 1))
          done
          echo "push failed after retries" >&2
          exit 1

      - name: Fail if any generator errored
        if: |
          steps.game-notes.outcome == 'failure' ||
          steps.war.outcome == 'failure' ||
          steps.rehab.outcome == 'failure' ||
          steps.umpires.outcome == 'failure' ||
          steps.umpire-accuracy.outcome == 'failure' ||
          steps.minors-leaders.outcome == 'failure' ||
          steps.callouts.outcome == 'failure' ||
          steps.former-teammates.outcome == 'failure' ||
          steps.career-matchups.outcome == 'failure' ||
          steps.fouls.outcome == 'failure' ||
          steps.workload.outcome == 'failure' ||
          steps.lineup-values.outcome == 'failure' ||
          steps.vs-team-splits.outcome == 'failure' ||
          steps.savant-percentiles.outcome == 'failure' ||
          steps.milestones.outcome == 'failure' ||
          steps.rookies.outcome == 'failure' ||
          steps.season-score.outcome == 'failure' ||
          steps.team-score.outcome == 'failure' ||
          steps.team-transactions.outcome == 'failure' ||
          steps.fever-radar.outcome == 'failure' ||
          steps.comeback-wins.outcome == 'failure' ||
          steps.warm-previews.outcome == 'failure'
        run: |
          echo "One or more nightly generators failed — see the step logs above."
          exit 1
