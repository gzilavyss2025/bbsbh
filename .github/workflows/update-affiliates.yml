name: Update affiliates data

# Weekly refresh of public/data/affiliates.json from statsapi (see
# scripts/gen-affiliates.mjs). An org's farm system changes at most once a
# year (the offseason PDC realignment), so weekly is plenty. Staggered an
# hour after update-teams.yml. Pushing to main triggers Vercel's normal
# auto-deploy.
on:
  schedule:
    - cron: '0 10 * * 1' # Monday ~5-6am US Eastern, an hour after update-teams
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-affiliates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/gen-affiliates.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/affiliates.json
          git diff --cached --quiet || git commit -m "Update affiliates data"
          git push
