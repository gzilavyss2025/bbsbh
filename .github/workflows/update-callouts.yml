name: Update game call-outs

# Nightly build of public/data/callouts/<MMDDYYYY>.json — the next day's per-game
# enrichment (leader call-outs, streaks, situational team records; see
# scripts/gen-callouts.mjs). Pushing to main triggers Vercel's normal auto-deploy
# so each morning's slate has its notes ready, with no runtime dependency on the
# hundreds of statsapi calls the script makes. Offset from the WAR (09:00), rehab
# (09:30), and minors-leaders (10:00) jobs so the nightly commits don't race.
on:
  schedule:
    - cron: '30 10 * * *' # ~6:30am US Eastern — runs for TOMORROW's slate by default
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-callouts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/gen-callouts.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/callouts 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update game call-outs"
          git push
