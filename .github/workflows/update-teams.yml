name: Update teams data

# Weekly refresh of public/data/teams.json from statsapi (see scripts/gen-teams.mjs).
# Team/org structure — realignment, expansion, affiliate shuffles — is a
# roughly once-a-decade event, so weekly (vs war.json's nightly) is plenty.
# Pushing to main triggers Vercel's normal auto-deploy.
on:
  schedule:
    - cron: '0 9 * * 1' # Monday ~4-5am US Eastern
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-teams:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/gen-teams.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/teams.json
          git diff --cached --quiet || git commit -m "Update teams data"
          git push
