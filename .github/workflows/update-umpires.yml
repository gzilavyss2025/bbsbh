name: Update umpires

# Daily refresh of public/data/umpires.json from the MLB Stats API (see
# scripts/gen-umpires.mjs). Pushing to main triggers Vercel's normal
# auto-deploy, so the umpire detail page picks up each day's games with no
# runtime dependency on the full-season schedule scan the script runs.
# Offset from the other nightly data jobs so the commits don't race to push.
on:
  schedule:
    - cron: '45 9 * * *' # ~5:45am US Eastern, after the previous night's games go Final
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-umpires:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/gen-umpires.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/umpires.json
          git diff --cached --quiet || git commit -m "Update umpires"
          git push
