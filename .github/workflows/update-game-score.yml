name: Update game score

# Runs gen-game-score.mjs on its OWN tight cron, separate from
# update-nightly-data.yml — Game Score's whole point is landing within
# minutes of a game going Final (see docs/game-score.md), which a once-nightly
# batch can't deliver. Every 10 minutes is GitHub Actions' scheduling slop
# already factored in — cron is best-effort, not exact, so scores typically
# show up ~10-15 minutes after Final. The generator itself is cheap and
# incremental (only newly-Final gamePks get a feed fetch), so a 10-minute
# cadence doesn't add meaningful cost even though it's a separate workflow
# from the nightly batch.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-game-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # main requires the lint-and-build status check, which the default
          # GITHUB_TOKEN can never satisfy on a bare push (no PR = no check
          # run for that commit, and a PR opened with GITHUB_TOKEN doesn't
          # even trigger CI — GitHub suppresses workflow-triggered-workflow
          # chains). GH_BOT_TOKEN is a fine-grained PAT for the repo owner
          # (admin), so pushes with it bypass the required check the same
          # way the maintainer's own direct pushes already do.
          token: ${{ secrets.GH_BOT_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 26 # node:sqlite ships stable here (docs/adr/0021)

      - name: Game score
        run: node scripts/gen-game-score.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/game-score.json scripts/data/game-scores.sql
          git diff --cached --quiet && exit 0
          git commit -m "Update game score"
          # This cron's :00 minute collides with update-nightly-data.yml's
          # once-a-day run (~7:00-11:00 UTC, depending on its wait-for-Final
          # backoff) — retry with a rebase on a push race
          # instead of silently dropping this run's scores (see that
          # workflow's header for the collision this same push shape once hit).
          # scripts/data/game-scores.sql is this workflow's own dump file
          # (docs/adr/0021, scripts/lib/db.js) — the nightly workflow never
          # touches it, so the rebase always replays clean, same as the JSON.
          for i in 1 2 3 4 5; do
            git push && exit 0
            git fetch origin "$(git rev-parse --abbrev-ref HEAD)"
            git rebase "origin/$(git rev-parse --abbrev-ref HEAD)"
            sleep $((RANDOM % 10 + 1))
          done
          echo "push failed after retries" >&2
          exit 1
