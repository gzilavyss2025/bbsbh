<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<!--
  Source art for the social/link-preview image (Open Graph + Twitter card).
  Rendered to public/og-image.png at 1200×630 by scripts/gen-og-image.mjs.
  Direction: field-notes utility with the approved Tally Baseball mark and
  wordmark. Palette is lifted verbatim from src/tokens/colors.css. Edit here,
  then re-run the script.
-->
<style>
  :root {
    --navy: #1b2a3a;
    --cream: #fbf6e9;
    --paper: #f6efdc;
    --clay: #b4453a;
    --seal: #b5824a;
    --seal-hatch: #a9743c;
    --seal-ink: #1e1405;
    --graphite: #6b6558;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: "Helvetica Neue", Arial, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }
  .og {
    width: 1200px; height: 630px; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center; gap: 56px;
    padding: 0 104px;
    background:
      repeating-linear-gradient(0deg, transparent 0 74px, rgba(180,69,58,.05) 74px 75px),
      var(--paper);
    color: var(--navy);
  }
  /* inner keyline, like a scorebook page border */
  .og::after {
    content: ""; position: absolute; inset: 26px;
    border: 4px solid rgba(27,42,58,.14); border-radius: 22px; pointer-events: none;
  }
  .mark { width: 300px; height: 300px; flex: none; display: block; }
  .mark svg { display: block; width: 100%; height: 100%; }
  .txt { display: flex; flex-direction: column; gap: 20px; z-index: 1; }
  .sport {
    font-size: 30px; letter-spacing: .32em; text-transform: uppercase;
    color: var(--navy); font-weight: 800;
  }
  .wordmark { display: block; width: 440px; height: auto; }
  .sub { font-size: 36px; color: var(--graphite); max-width: 470px; line-height: 1.3; }
  /* kraft-tape strip, stamped across the top-right corner */
  .tape {
    position: absolute; top: 58px; right: -72px; transform: rotate(9deg);
    background:
      repeating-linear-gradient(-45deg, var(--seal) 0 24px, var(--seal-hatch) 24px 48px);
    color: var(--seal-ink); font-weight: 800; letter-spacing: .12em;
    text-transform: uppercase; font-size: 30px; padding: 16px 92px;
    box-shadow: 0 12px 30px rgba(0,0,0,.2);
  }
  /* Small status pill for routes that use the static fallback card. */
  .cta {
    display: inline-flex; align-items: center; gap: 14px; align-self: flex-start;
    background: var(--navy); color: var(--cream); border-radius: 999px;
    padding: 16px 34px; font-size: 30px; font-weight: 800; letter-spacing: .01em;
  }
  .cta .arrow { color: var(--seal); font-weight: 800; }
</style>
</head>
<body>
  <div class="og">
    <span class="tape">Sealed results</span>
    <span class="mark">
      <svg viewBox="0 0 320 320" aria-hidden="true">
        <defs>
          <linearGradient id="ogMarkClay" x1="0" y1="0" x2="0.88" y2="1">
            <stop offset="0" stop-color="#B93F31"/>
            <stop offset="0.52" stop-color="#B43C2E"/>
            <stop offset="1" stop-color="#AE392D"/>
          </linearGradient>
        </defs>
        <rect width="320" height="320" rx="32" fill="url(#ogMarkClay)"/>
        <g fill="#F7EEE2">
          <rect x="47" y="52" width="87" height="83" rx="6"/>
          <rect x="188" y="52" width="87" height="83" rx="6"/>
          <rect x="47" y="190" width="87" height="83" rx="6"/>
          <rect x="188" y="190" width="87" height="83" rx="6"/>
        </g>
        <circle cx="161" cy="164" r="82" fill="url(#ogMarkClay)"/>
        <circle cx="161" cy="164" r="63" fill="#F7EEE2"/>
        <g fill="none" stroke="url(#ogMarkClay)" stroke-width="10" stroke-linecap="round">
          <path d="M117 121C146 141 146 187 117 207"/>
          <path d="M205 121C176 141 176 187 205 207"/>
        </g>
      </svg>
    </span>
    <span class="txt">
      <img class="wordmark" src="../public/brand/tally-wordmark.png" alt="Tally">
      <span class="sport">Baseball</span>
      <span class="sub">For scorekeeping, delayed watching, and baseball research with sealed game results.</span>
      <span class="cta">Open the slate <span class="arrow">&rarr;</span></span>
    </span>
  </div>
</body>
</html>
